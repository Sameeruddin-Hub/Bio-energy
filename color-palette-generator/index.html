<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color palette generator</title>
    <link rel="stylesheet" href="style.css">
    <link rel='stylesheet'
        href='https://cdn-uicons.flaticon.com/4.0.0/uicons-regular-rounded/css/uicons-regular-rounded.css'>
    <link rel='stylesheet'
        href='https://cdn-uicons.flaticon.com/4.0.0/uicons-regular-chubby/css/uicons-regular-chubby.css'>
    <link rel='stylesheet'
        href='https://cdn-uicons.flaticon.com/4.0.0/uicons-regular-rounded/css/uicons-regular-rounded.css'>
    <link rel='stylesheet'
        href='https://cdn-uicons.flaticon.com/4.0.0/uicons-solid-rounded/css/uicons-solid-rounded.css'>
</head>

<body>
    <div class="container">

        <h1>Color Palette Generator</h1>
        <button id="generate-btn">
            <i class="fi fi-rr-refresh"></i>
            Generate Palette
        </button>

        <div class="palette-container">
            <!-- color box -1 -->
            <div class="color-box">
                <div class="color" style="background-color: #1f9dd8;"></div>
                <div class="color-info">
                    <span class="hex-value">
                        #1f9dd8
                    </span>
                    <i class="fi fi-rr-copy-alt copy-btn" title="Copy to clipboard"></i>
                </div>
            </div>
            <div class="color-box">
                <div class="color" style="background-color: #1f22c0;"></div>
                <div class="color-info">
                    <span class="hex-value">
                        #1f22c0
                    </span>
                    <i class="fi fi-rr-copy-alt copy-btn" title="Copy to clipboard"></i>
                </div>
            </div>
            <div class="color-box">
                <div class="color" style="background-color: #21bd62;"></div>
                <div class="color-info">
                    <span class="hex-value">
                        #21bd62
                    </span>
                    <i class="fi fi-rr-copy-alt copy-btn" title="Copy to clipboard"></i>
                </div>
            </div>
            <div class="color-box">
                <div class="color" style="background-color: #ffe70a;"></div>
                <div class="color-info">
                    <span class="hex-value">
                        #ffe70a
                    </span>
                    <i class="fi fi-rr-copy-alt copy-btn" title="Copy to clipboard"></i>
                </div>
            </div>
            <div class="color-box">
                <div class="color" style="background-color: #ec0ca2;"></div>
                <div class="color-info">
                    <span class="hex-value">
                        #ec0ca2
                    </span>
                    <i class="fi fi-rr-copy-alt copy-btn" title="Copy to clipboard"></i>
                </div>
            </div>

        </div>
    </div>


    <script src="script.js"></script>
</body>

</html>
